<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ffcc00, #ff3b3b);
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    .container {
        background: rgba(0,0,0,0.3);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    h1 {
        margin-bottom: 30px;
        font-size: 2em;
    }

    button {
        padding: 15px 30px;
        font-size: 1.2em;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #ffcc00;
        color: #000;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        background: #ffd633;
    }

    #surprise {
        margin-top: 20px;
        font-size: 1.5em;
        display: none;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🍟 Welcome!</h1>
    <button onclick="showSurprise()">CLICK ME FOR SURPRISE</button>
    <div id="surprise">🎉 Surprise! Have a great day! 🎉</div>
</div>

<script>
function showSurprise() {
    document.getElementById("surprise").style.display = "block";
}
</script>

</body>
</html>
